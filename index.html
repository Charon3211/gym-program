<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>BPI 60-Day War</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-light: #1e1e1e;
            --accent: #ff3333;
            --accent-glow: rgba(255, 51, 51, 0.3);
            --text: #ffffff;
            --text-dim: #888888;
            --success: #00ff88;
            --warning: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            overflow-x: auto;
            padding: 15px 10px;
            gap: 8px;
            scrollbar-width: none;
            background: var(--bg);
        }

        .day-selector::-webkit-scrollbar { display: none; }

        .day-btn {
            flex-shrink: 0;
            padding: 12px 16px;
            border: 1px solid #333;
            background: var(--surface);
            color: var(--text-dim);
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 70px;
            text-align: center;
        }

        .day-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .day-btn.rest {
            border-color: #444;
            color: #666;
        }

        /* Workout Content */
        .workout-container {
            padding: 0 15px 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        .day-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 20px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .day-title .muscle-group {
            font-size: 0.75rem;
            color: var(--accent);
            background: rgba(255, 51, 51, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* Exercise Card */
        .exercise-card {
            background: var(--surface);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .exercise-card:hover {
            border-color: #333;
        }

        .exercise-card.completed {
            border-color: rgba(0, 255, 136, 0.3);
            background: linear-gradient(135deg, var(--surface) 0%, rgba(0, 255, 136, 0.05) 100%);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .exercise-name {
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
        }

        .exercise-check {
            width: 28px;
            height: 28px;
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .exercise-check.checked {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        .exercise-check.checked::after {
            content: "✓";
            color: #000;
            font-weight: 900;
            font-size: 14px;
        }

        .exercise-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .meta-item {
            background: var(--surface-light);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .meta-item .label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .meta-item .value {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .notes {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-style: italic;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        /* Sets Tracker */
        .sets-tracker {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .set-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #333;
            background: transparent;
            color: var(--text);
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .set-btn.completed {
            background: var(--success);
            border-color: var(--success);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        /* Timer */
        .timer-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, var(--bg) 0%, var(--surface) 100%);
            border-top: 1px solid #222;
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .timer-display {
            font-size: 2rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }

        .timer-display.running {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .timer-controls {
            display: flex;
            gap: 10px;
        }

        .timer-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-btn.start {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .timer-btn.stop {
            background: #333;
            color: white;
        }

        .timer-btn.reset {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-dim);
        }

        /* Progress Bar */
        .progress-section {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid #222;
        }

        .progress-bar {
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #ff6666 100%);
            border-radius: 3px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        /* Rest Day */
        .rest-day {
            text-align: center;
            padding: 60px 20px;
        }

        .rest-day .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .rest-day h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-dim);
        }

        .rest-day p {
            color: #555;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exercise-card {
            animation: slideIn 0.4s ease forwards;
        }

        /* Weight Input */
        .weight-input {
            background: var(--surface-light);
            border: 1px solid #333;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            width: 80px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-left: auto;
        }

        .weight-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .weight-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>60-DAY WAR</h1>
        <div class="subtitle">BPI Team Aesthetics</div>
    </div>

    <div class="progress-section" id="progressSection">
        <div class="progress-text">
            <span>Today's Progress</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <div class="day-selector" id="daySelector">
        <button class="day-btn active" data-day="mon">MON<br><small>Legs</small></button>
        <button class="day-btn" data-day="tue">TUE<br><small>Shoulders</small></button>
        <button class="day-btn rest" data-day="wed">WED<br><small>Rest</small></button>
        <button class="day-btn" data-day="thu">THU<br><small>Back</small></button>
        <button class="day-btn" data-day="fri">FRI<br><small>Chest</small></button>
        <button class="day-btn" data-day="sat">SAT<br><small>Arms</small></button>
        <button class="day-btn rest" data-day="sun">SUN<br><small>Rest</small></button>
    </div>

    <div class="workout-container" id="workoutContainer">
        <!-- Content injected by JS -->
    </div>

    <div class="timer-section">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-controls">
            <button class="timer-btn reset" onclick="resetTimer()">↺</button>
            <button class="timer-btn start" id="timerBtn" onclick="toggleTimer()">START</button>
        </div>
    </div>

    <script>
        // Workout Data
        const workouts = {
            mon: {
                title: "Monday — Quads / Hamstrings / Abs",
                muscles: "Legs & Core",
                exercises: [
                    { name: "Leg Curls", sets: 4, reps: "15", notes: "1 rep short of failure", muscle: "Hamstrings" },
                    { name: "Leg Extension", sets: 4, reps: "15", notes: "1 rep short of failure", muscle: "Quads" },
                    { name: "Romanian / Stiff Leg Deadlift", sets: 4, reps: "15", notes: "1 rep short of failure", muscle: "Hamstrings" },
                    { name: "Squat", sets: 4, reps: "10", notes: "2 reps short of failure", muscle: "Quads" },
                    { name: "Decline Crunch", sets: 2, reps: "20", notes: "—", muscle: "Abs" },
                    { name: "Hanging Leg Raise", sets: 2, reps: "15", notes: "—", muscle: "Abs" }
                ]
            },
            tue: {
                title: "Tuesday — Shoulders / Calves",
                muscles: "Delts & Calves",
                exercises: [
                    { name: "DB Lateral Raises", sets: 4, reps: "12", notes: "Pause at top. 2 reps short of failure", muscle: "Side Delts" },
                    { name: "Barbell Seated Press", sets: 3, reps: "10", notes: "2 reps short of failure", muscle: "Front Delts" },
                    { name: "DB Bent-Over Reverse Flys", sets: 4, reps: "15", notes: "Pause at top. To failure", muscle: "Rear Delts" },
                    { name: "Leg-Press Calf Raise", sets: 4, reps: "12", notes: "Pause at top. To failure", muscle: "Calves" },
                    { name: "Seated Calf Raise", sets: 4, reps: "15", notes: "Pause at top. To failure", muscle: "Calves" }
                ]
            },
            wed: { rest: true, title: "Wednesday — Rest Day", muscles: "Recovery" },
            thu: {
                title: "Thursday — Back",
                muscles: "Back Width & Thickness",
                exercises: [
                    { name: "Single Arm Cable Row", sets: 4, reps: "12", notes: "1s iso hold. 1 rep short of failure", muscle: "Lats" },
                    { name: "Lat Pulldown", sets: 4, reps: "12", notes: "To failure", muscle: "Lats" },
                    { name: "Barbell Row", sets: 3, reps: "10", notes: "To failure", muscle: "Mid Back" },
                    { name: "Single Arm Wide Row", sets: 4, reps: "12", notes: "2 reps short of failure", muscle: "Lats" }
                ]
            },
            fri: {
                title: "Friday — Chest",
                muscles: "Chest Development",
                exercises: [
                    { name: "DB Incline Press", sets: 4, reps: "12", notes: "2 reps short of failure", muscle: "Upper Chest" },
                    { name: "DB Flat Hammer Press", sets: 3, reps: "10", notes: "1 rep short of failure", muscle: "Chest" },
                    { name: "DB Flys", sets: 4, reps: "15", notes: "1 rep short of failure", muscle: "Chest" },
                    { name: "Low Cable Flys", sets: 4, reps: "15", notes: "To failure", muscle: "Upper Chest" }
                ]
            },
            sat: {
                title: "Saturday — Arms",
                muscles: "Biceps & Triceps",
                exercises: [
                    { name: "DB Extensions", sets: 4, reps: "12", notes: "1 rep short of failure", muscle: "Triceps" },
                    { name: "Incline DB Curls", sets: 4, reps: "10", notes: "1 rep short of failure", muscle: "Biceps" },
                    { name: "Cable Curls", sets: 4, reps: "10", notes: "To failure", muscle: "Biceps" },
                    { name: "DB Kickbacks", sets: 4, reps: "15", notes: "To failure", muscle: "Triceps" },
                    { name: "Tricep Push Down", sets: 4, reps: "10", notes: "To failure", muscle: "Triceps" },
                    { name: "Incline Spider Curls", sets: 4, reps: "10", notes: "To failure", muscle: "Biceps" }
                ]
            },
            sun: { rest: true, title: "Sunday — Rest Day", muscles: "Recovery", note: "Light cardio optional. Stay on diet." }
        };

        // State
        let currentDay = 'mon';
        let completedExercises = JSON.parse(localStorage.getItem('bpi_completed') || '{}');
        let completedSets = JSON.parse(localStorage.getItem('bpi_sets') || '{}');
        let weights = JSON.parse(localStorage.getItem('bpi_weights') || '{}');
        let timerInterval;
        let timerSeconds = 0;
        let timerRunning = false;

        // Initialize
        function init() {
            renderDay(currentDay);
            updateProgress();

            // Day selector
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDay = btn.dataset.day;
                    renderDay(currentDay);
                    updateProgress();
                });
            });
        }

        function renderDay(day) {
            const container = document.getElementById('workoutContainer');
            const workout = workouts[day];

            if (workout.rest) {
                container.innerHTML = `
                    <div class="rest-day">
                        <div class="icon">💤</div>
                        <h2>${workout.title}</h2>
                        <p>${workout.note || 'Recovery is when growth happens. Eat well, sleep deep.'}</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="day-title">
                    ${workout.title}
                    <span class="muscle-group">${workout.muscles}</span>
                </div>
            `;

            workout.exercises.forEach((ex, idx) => {
                const exId = `${day}_${idx}`;
                const isCompleted = completedExercises[exId];
                const exSets = completedSets[exId] || [];
                const weight = weights[exId] || '';

                html += `
                    <div class="exercise-card ${isCompleted ? 'completed' : ''}" style="animation-delay: ${idx * 0.1}s">
                        <div class="exercise-header">
                            <div class="exercise-name">${ex.name}</div>
                            <div class="exercise-check ${isCompleted ? 'checked' : ''}" onclick="toggleExercise('${exId}')"></div>
                        </div>
                        <div class="exercise-meta">
                            <div class="meta-item">
                                <div class="label">Sets</div>
                                <div class="value">${ex.sets}</div>
                            </div>
                            <div class="meta-item">
                                <div class="label">Reps</div>
                                <div class="value">${ex.reps}</div>
                            </div>
                            <div class="meta-item">
                                <div class="label">Muscle</div>
                                <div class="value" style="font-size:0.9rem">${ex.muscle}</div>
                            </div>
                        </div>
                        <div class="notes">${ex.notes}</div>
                        <div style="display:flex; align-items:center; gap:10px; margin-top:12px;">
                            <span style="font-size:0.75rem; color:var(--text-dim);">Weight (lbs):</span>
                            <input type="number" class="weight-input" placeholder="0" value="${weight}" 
                                onchange="saveWeight('${exId}', this.value)">
                        </div>
                        <div class="sets-tracker">
                            ${Array.from({length: ex.sets}, (_, i) => `
                                <button class="set-btn ${exSets.includes(i) ? 'completed' : ''}" 
                                    onclick="toggleSet('${exId}', ${i})">${i + 1}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function toggleExercise(exId) {
            if (completedExercises[exId]) {
                delete completedExercises[exId];
            } else {
                completedExercises[exId] = true;
                // Also mark all sets
                const [day, idx] = exId.split('_');
                const ex = workouts[day].exercises[idx];
                completedSets[exId] = Array.from({length: ex.sets}, (_, i) => i);
            }
            localStorage.setItem('bpi_completed', JSON.stringify(completedExercises));
            localStorage.setItem('bpi_sets', JSON.stringify(completedSets));
            renderDay(currentDay);
            updateProgress();
        }

        function toggleSet(exId, setIdx) {
            if (!completedSets[exId]) completedSets[exId] = [];
            const idx = completedSets[exId].indexOf(setIdx);
            if (idx > -1) {
                completedSets[exId].splice(idx, 1);
            } else {
                completedSets[exId].push(setIdx);
            }
            localStorage.setItem('bpi_sets', JSON.stringify(completedSets));
            renderDay(currentDay);
            updateProgress();
        }

        function saveWeight(exId, value) {
            weights[exId] = value;
            localStorage.setItem('bpi_weights', JSON.stringify(weights));
        }

        function updateProgress() {
            const workout = workouts[currentDay];
            if (workout.rest) {
                document.getElementById('progressSection').style.display = 'none';
                return;
            }
            document.getElementById('progressSection').style.display = 'block';

            let totalSets = 0;
            let completed = 0;

            workout.exercises.forEach((ex, idx) => {
                const exId = `${currentDay}_${idx}`;
                totalSets += ex.sets;
                completed += (completedSets[exId] || []).length;
            });

            const percent = totalSets > 0 ? Math.round((completed / totalSets) * 100) : 0;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // Timer Functions
        function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            const display = document.getElementById('timerDisplay');

            if (timerRunning) {
                clearInterval(timerInterval);
                timerRunning = false;
                btn.textContent = 'START';
                btn.className = 'timer-btn start';
                display.classList.remove('running');
            } else {
                timerRunning = true;
                btn.textContent = 'STOP';
                btn.className = 'timer-btn stop';
                display.classList.add('running');
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    updateTimerDisplay();
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            timerSeconds = 0;
            updateTimerDisplay();
            document.getElementById('timerBtn').textContent = 'START';
            document.getElementById('timerBtn').className = 'timer-btn start';
            document.getElementById('timerDisplay').classList.remove('running');
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const secs = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').textContent = `${mins}:${secs}`;
        }

        // Start
        init();
    </script>
</body>
</html>
