<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Gym Flow · Jihan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050505;--bg-2:#0c0c0c;--bg-3:#141414;
  --glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.07);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);--purple-glow:rgba(168,85,247,0.28);
  --cyan:#22d3ee;--cyan-dim:rgba(34,211,238,0.12);--cyan-glow:rgba(34,211,238,0.28);
  --orange:#f97316;--orange-dim:rgba(249,115,22,0.12);--orange-glow:rgba(249,115,22,0.28);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--blue-glow:rgba(59,130,246,0.28);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);--green-glow:rgba(34,197,94,0.28);
  --pink:#ec4899;--pink-dim:rgba(236,72,153,0.12);--pink-glow:rgba(236,72,153,0.28);
  --teal:#14b8a6;--teal-dim:rgba(20,184,166,0.12);--teal-glow:rgba(20,184,166,0.28);
  --text:#f1f5f9;--text-2:#94a3b8;--text-3:#475569;
  --ease:cubic-bezier(0.2,1,0.3,1);--ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:28px;--r-2xl:36px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;touch-action:pan-y}
button{font-family:inherit;cursor:pointer;border:none;background:none}
#app{height:100%;position:relative;overflow:hidden}
.view{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(16px);transition:opacity .38s var(--ease),transform .38s var(--ease);will-change:transform,opacity}
.view.active{opacity:1;pointer-events:all;transform:translateY(0)}
.view.slide-up{transform:translateY(100%);opacity:1;transition:opacity .42s var(--ease),transform .42s var(--ease)}
.view.slide-up.active{transform:translateY(0)}
.view.slide-left{transform:translateX(100%);opacity:1;transition:opacity .38s var(--ease),transform .38s var(--ease)}
.view.slide-left.active{transform:translateX(0)}
.view-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.view-scroll::-webkit-scrollbar{display:none}
/* Dashboard */
.dash-header{padding:calc(var(--safe-top) + 20px) 20px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--orange),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.date-chip{background:var(--glass);border:1px solid var(--glass-b);padding:5px 12px;border-radius:100px;font-size:12px;color:var(--text-2);font-weight:500}
.dash-body{padding:4px 20px 140px}
.week-heading{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-.8px;margin-bottom:3px}
.week-range{font-size:13px;color:var(--text-2);margin-bottom:22px}
.stats-strip{display:flex;gap:10px;margin-bottom:24px}
.stat-box{flex:1;background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r-md);padding:14px 12px;text-align:center}
.stat-val{display:block;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
.stat-lbl{display:block;font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.day-card{position:relative;border-radius:var(--r-lg);padding:18px 16px 16px;cursor:pointer;overflow:hidden;border:1px solid var(--glass-b);background:var(--glass);transition:transform .22s var(--ease),box-shadow .22s var(--ease);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);user-select:none}
.day-card:not(.rest-card):active{transform:scale(.955)}
.day-card.is-today{border-color:var(--c-accent);box-shadow:0 0 0 1px var(--c-accent),0 4px 24px var(--c-glow);grid-column:1/-1}
.day-card.is-today::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,var(--c-dim) 0%,transparent 65%);pointer-events:none}
.day-card.is-done{opacity:.55}
.done-check{position:absolute;top:14px;right:14px;width:24px;height:24px;background:var(--green);color:#050505;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.rest-card{cursor:default;opacity:.38}
.card-orb{position:absolute;bottom:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:var(--c-accent);opacity:.07;filter:blur(28px);pointer-events:none;transition:opacity .3s}
.day-card:hover .card-orb{opacity:.13}
.card-dow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:6px}
.card-dow.accent{color:var(--c-accent)}
.card-today-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--c-accent);margin-right:5px;vertical-align:middle;margin-bottom:1px}
.card-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.05;margin-bottom:5px}
.card-muscles{font-size:12px;color:var(--text-2);margin-bottom:11px;line-height:1.4}
.card-footer{display:flex;align-items:center;gap:7px}
.card-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;background:var(--c-dim);color:var(--c-accent)}
.card-dur{font-size:11px;color:var(--text-3)}
/* Detail */
.detail-hero{position:relative;padding:calc(var(--safe-top) + 12px) 20px 28px;overflow:hidden;flex-shrink:0}
.hero-bg{position:absolute;inset:0;background:linear-gradient(150deg,var(--d-dim) 0%,transparent 65%);pointer-events:none}
.hero-glow{position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--d-accent);opacity:.06;filter:blur(60px);pointer-events:none}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--text-2);padding:8px 0;margin-bottom:18px;transition:color .18s;position:relative;z-index:1}
.back-btn:hover{color:var(--text)}
.detail-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--d-accent);margin-bottom:7px;position:relative;z-index:1}
.detail-title{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:7px;position:relative;z-index:1}
.detail-sub{font-size:14px;color:var(--text-2);margin-bottom:20px;position:relative;z-index:1}
.detail-kpis{display:flex;gap:24px;position:relative;z-index:1}
.kpi{display:flex;flex-direction:column;gap:2px}
.kpi-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--d-accent);letter-spacing:-.5px}
.kpi-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em}
.detail-tip{margin:0 20px 16px;padding:14px 16px;border-radius:var(--r-md);border-left:3px solid var(--d-accent);background:var(--d-dim);font-size:13px;line-height:1.6;color:var(--text-2)}
.detail-tip strong{color:var(--d-accent)}
.ex-list{padding:4px 20px 130px}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-3);margin-bottom:12px;margin-top:4px}
.ex-row{display:flex;align-items:center;gap:14px;background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r-md);padding:16px 16px 16px 20px;margin-bottom:9px;position:relative}
.ex-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--d-accent);border-radius:0 3px 3px 0}
.ex-icon{width:42px;height:42px;border-radius:50%;background:var(--d-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;letter-spacing:-.2px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{display:flex;align-items:center;gap:7px}
.ex-sr{font-size:12px;color:var(--text-2)}
.muscle-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.06em;background:var(--d-dim);color:var(--d-accent)}
.ex-rest{font-size:12px;color:var(--text-3);flex-shrink:0}
/* Buttons */
.sticky-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 20px calc(var(--safe-bottom) + 14px);background:linear-gradient(to top,var(--bg) 55%,transparent);display:flex;gap:10px;z-index:10}
.btn-primary{flex:1;padding:19px 20px;border-radius:var(--r-lg);background:linear-gradient(135deg,var(--f-accent,var(--orange)),var(--f-accent2,var(--f-accent,var(--orange))));color:#050505;font-size:16px;font-weight:700;letter-spacing:-.2px;transition:transform .22s var(--ease-spring),box-shadow .22s var(--ease);box-shadow:0 8px 28px var(--f-glow,var(--orange-glow));will-change:transform}
.btn-primary:active{transform:scale(.965);box-shadow:0 4px 12px var(--f-glow,var(--orange-glow))}
.btn-secondary{padding:19px 20px;border-radius:var(--r-lg);border:1px solid var(--glass-b);background:var(--glass);color:var(--text-2);font-size:14px;font-weight:600;transition:transform .2s var(--ease),background .2s}
.btn-secondary:active{transform:scale(.965);background:rgba(255,255,255,.07)}
/* Focus */
.focus-topbar{padding:calc(var(--safe-top) + 14px) 20px 10px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.focus-exit-btn{width:38px;height:38px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:16px;flex-shrink:0;transition:transform .18s var(--ease)}
.focus-exit-btn:active{transform:scale(.9)}
.prog-track{flex:1;height:4px;background:var(--glass-b);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--f-accent),var(--f-accent2,var(--f-accent)));border-radius:100px;transition:width .55s var(--ease)}
.prog-count{font-size:13px;font-weight:600;color:var(--text-3);flex-shrink:0;font-variant-numeric:tabular-nums}
.focus-body{padding:6px 20px 160px}
.focus-card{background:var(--bg-2);border:1px solid var(--glass-b);border-radius:var(--r-2xl);padding:28px 24px 26px;position:relative;overflow:hidden;margin-bottom:12px;transition:transform .32s var(--ease),opacity .32s var(--ease);will-change:transform,opacity}
.focus-card.exit{transform:translateX(-50px) scale(.94);opacity:0}
.focus-icon-wrap{width:72px;height:72px;border-radius:var(--r-xl);background:var(--f-dim);display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:18px}
.fc-glow{position:absolute;top:-40px;right:-50px;width:140px;height:140px;border-radius:50%;background:var(--f-accent);opacity:.07;filter:blur(50px);pointer-events:none;animation:pulse-orb 3s ease-in-out infinite}
@keyframes pulse-orb{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:.11;transform:scale(1.1)}}
.focus-muscle-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:var(--f-dim);color:var(--f-accent);margin-bottom:14px}
.focus-ex-name{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-1px;line-height:1.05;margin-bottom:20px}
.reps-hero{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--f-accent);letter-spacing:-2px;line-height:1;text-align:center;margin-bottom:3px}
.reps-sub{font-size:12px;color:var(--text-3);text-align:center;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.sets-module{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:12px}
.sets-mod-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:13px}
.sets-row{display:flex;gap:9px;flex-wrap:wrap}
.set-chip{min-width:52px;height:52px;border-radius:var(--r-sm);border:1.5px solid var(--glass-b);background:var(--bg-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;transition:all .22s var(--ease-spring);will-change:transform}
.set-chip:active{transform:scale(.92)}
.set-chip-num{font-size:14px;font-weight:700;color:var(--text-3)}
.set-chip-lbl{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
.set-chip.active{border-color:var(--f-accent);background:var(--f-dim);transform:scale(1.05)}
.set-chip.active .set-chip-num,.set-chip.active .set-chip-lbl{color:var(--f-accent)}
.set-chip.done{border-color:var(--green);background:var(--green-dim)}
.set-chip.done .set-chip-num,.set-chip.done .set-chip-lbl{color:var(--green)}
.rest-block{background:var(--bg-2);border:1.5px solid var(--f-accent);border-radius:var(--r-xl);padding:24px 20px 20px;text-align:center;position:relative;overflow:hidden;margin-bottom:12px;box-shadow:0 0 32px var(--f-glow);animation:rest-appear .35s var(--ease-spring) both}
@keyframes rest-appear{from{transform:scale(.9) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.rest-block-bg{position:absolute;inset:0;background:linear-gradient(145deg,var(--f-dim),transparent);pointer-events:none}
.rest-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-2);margin-bottom:12px;position:relative}
.ring-wrap{width:88px;height:88px;margin:0 auto 10px;position:relative}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--glass-b);stroke-width:5}
.ring-arc{fill:none;stroke:var(--f-accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.05s linear}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--f-accent);font-variant-numeric:tabular-nums}
.rest-next-ex{font-size:13px;color:var(--text-2);margin-bottom:14px;position:relative}
.rest-skip{padding:9px 22px;border-radius:100px;border:1px solid var(--glass-b);background:transparent;color:var(--text-2);font-size:13px;font-weight:600;transition:all .18s;position:relative}
.rest-skip:active{background:var(--glass);transform:scale(.96)}
.how-card{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:12px}
.how-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:12px}
.how-text{font-size:14px;color:var(--text-2);line-height:1.65}
.how-text strong{color:var(--f-accent);font-weight:600}
.focus-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px calc(var(--safe-bottom) + 12px);background:linear-gradient(to top,var(--bg) 65%,transparent);z-index:10}
.focus-bar-inner{display:flex;gap:10px}
/* Complete */
.complete-overlay{position:fixed;inset:0;background:rgba(5,5,5,.88);display:flex;align-items:flex-end;justify-content:center;padding:0 16px calc(var(--safe-bottom) + 20px);z-index:99;opacity:0;pointer-events:none;transition:opacity .38s var(--ease);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px)}
.complete-overlay.visible{opacity:1;pointer-events:all}
.complete-sheet{background:var(--bg-2);border:1px solid var(--glass-b);border-radius:var(--r-2xl) var(--r-2xl) var(--r-xl) var(--r-xl);padding:40px 28px 32px;text-align:center;width:100%;max-width:420px;transform:translateY(60px);transition:transform .5s var(--ease-spring)}
.complete-overlay.visible .complete-sheet{transform:translateY(0)}
.confetti-emoji{font-size:58px;display:block;margin-bottom:16px}
.complete-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--orange),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.complete-sub{font-size:15px;color:var(--text-2);margin-bottom:28px;line-height:1.5}
.complete-stats{display:flex;gap:10px;margin-bottom:28px}
.cs-box{flex:1;background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r-md);padding:16px 10px}
.cs-val{display:block;font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:3px}
.cs-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em}
.complete-cta{width:100%;padding:19px;border-radius:var(--r-lg);border:none;background:linear-gradient(135deg,var(--orange),var(--purple));color:#050505;font-size:16px;font-weight:700;cursor:pointer;transition:transform .22s var(--ease-spring);box-shadow:0 8px 28px var(--orange-glow)}
.complete-cta:active{transform:scale(.965)}
@keyframes card-in{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card-in{animation:card-in .4s var(--ease) both}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fade-up .35s var(--ease) both}
</style>
</head>
<body>
<div id="app">
  <div class="view active" id="view-dashboard">
    <div class="dash-header"><span class="logo">GYM FLOW</span><span class="date-chip" id="date-chip">—</span></div>
    <div class="view-scroll"><div class="dash-body">
      <div class="week-heading">This Week</div>
      <div class="week-range" id="week-range">—</div>
      <div class="stats-strip">
        <div class="stat-box"><span class="stat-val" id="s-done" style="color:var(--green)">0</span><span class="stat-lbl">Done</span></div>
        <div class="stat-box"><span class="stat-val" id="s-left" style="color:var(--blue)">6</span><span class="stat-lbl">Left</span></div>
        <div class="stat-box"><span class="stat-val" id="s-total" style="color:var(--text-2)">6</span><span class="stat-lbl">Total</span></div>
      </div>
      <div class="day-grid" id="day-grid"></div>
    </div></div>
  </div>
  <div class="view slide-up" id="view-detail">
    <div class="detail-hero" id="detail-hero">
      <div class="hero-bg"></div><div class="hero-glow"></div>
      <button class="back-btn" onclick="goBack('detail')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 13L5 8L10 3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</button>
      <div class="detail-tag" id="detail-tag"></div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-sub" id="detail-sub"></div>
      <div class="detail-kpis" id="detail-kpis"></div>
    </div>
    <div class="view-scroll">
      <div class="detail-tip" id="detail-tip" style="display:none"></div>
      <div class="ex-list" id="ex-list"></div>
    </div>
    <div class="sticky-bar" id="detail-sbar"><button class="btn-primary" onclick="startFocus()">Start Workout →</button></div>
  </div>
  <div class="view slide-left" id="view-focus">
    <div class="focus-topbar">
      <button class="focus-exit-btn" onclick="promptExit()">✕</button>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-count" id="prog-count">1/8</div>
    </div>
    <div class="view-scroll"><div class="focus-body" id="focus-body"></div></div>
    <div class="focus-bar"><div class="focus-bar-inner" id="focus-bar-btns"></div></div>
  </div>
  <div class="complete-overlay" id="done-overlay">
    <div class="complete-sheet">
      <span class="confetti-emoji">🔥</span>
      <div class="complete-title">Session Done!</div>
      <div class="complete-sub" id="done-sub">You crushed it.</div>
      <div class="complete-stats" id="done-stats"></div>
      <button class="complete-cta" onclick="finishAndReturn()">Back to Dashboard</button>
    </div>
  </div>
</div>
<script>
'use strict';
const PLAN={
  1:{name:'Push',sub:'Chest · Shoulders · Triceps',dur:'60–70 min',type:'push',icon:'🔥',color:'#f97316',dim:'rgba(249,115,22,0.12)',glow:'rgba(249,115,22,0.28)',c2:'#fb923c',

const DOW_SHORT=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DOW_LONG=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function hap(p=10){if(navigator.vibrate)navigator.vibrate(p)}
const S={view:'dashboard',dayId:null,exIdx:0,setsDone:[],restActive:false,restTotal:0,restLeft:0,restTid:null,workoutStart:null,completedDays:new Set()};
function weekKey(){const d=new Date(),utc=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=utc.getUTCDay()||7;utc.setUTCDate(utc.getUTCDate()+4-day);const y1=new Date(Date.UTC(utc.getUTCFullYear(),0,1));return utc.getUTCFullYear()+'-W'+Math.ceil(((utc-y1)/86400000+1)/7)}
function loadDone(){try{S.completedDays=new Set(JSON.parse(localStorage.getItem('gf3_'+weekKey())||'[]'))}catch(e){S.completedDays=new Set()}}
function saveDone(){try{localStorage.setItem('gf3_'+weekKey(),JSON.stringify([...S.completedDays]))}catch(e){}}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');S.view=id}
function goBack(from){hap(8);if(from==='detail')showView('dashboard');else{clearRest();showView('detail')}}
function promptExit(){hap(8);if(confirm('Exit workout? Progress will be lost.')){clearRest();showView('detail')}}
function renderDashboard(){
  const today=new Date(),dow=today.getDay();
  document.getElementById('date-chip').textContent=today.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const mon=new Date(today);mon.setDate(today.getDate()-((dow+6)%7));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById('week-range').textContent=mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+sun.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const trainDays=[1,2,3,4,5,6];
  const done=trainDays.filter(d=>S.completedDays.has(d)).length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=trainDays.length-done;
  document.getElementById('s-total').textContent=trainDays.length;
  const grid=document.getElementById('day-grid');grid.innerHTML='';
  [1,2,3,4,5,6,0].forEach((d,i)=>{
    const p=PLAN[d],isRest=p.type==='rest',isToday=d===dow,isDone=S.completedDays.has(d);
    const card=document.createElement('div');
    card.className='day-card card-in'+(isToday&&!isRest?' is-today':'')+(isDone?' is-done':'')+(isRest?' rest-card':'');
    card.style.cssText=`--c-accent:${p.color};--c-dim:${p.dim};--c-glow:${p.glow};animation-delay:${i*45}ms`;
    card.innerHTML=`<div class="card-orb"></div>${isDone?'<div class="done-check">✓</div>':''}<div class="card-dow ${isToday?'accent':''}">${isToday?'<span class="card-today-dot"></span>':''}${DOW_SHORT[d]}${isToday?' · TODAY':''}</div><div class="card-name">${p.icon} ${p.name}</div>${!isRest?`<div class="card-muscles">${p.sub}</div><div class="card-footer"><span class="card-pill">${p.exs.length} exercises</span><span class="card-dur">${p.dur}</span></div>`:'<div class="card-muscles" style="color:var(--text-3);font-style:italic">Sleep · protein · hydrate</div>'}`;
    if(!isRest)card.onclick=()=>openDay(d);

}
function openDay(dow){

function startFocus(){

function renderFocus(){

  document.getElementById('prog-count').textContent=`${idx+1}/${exs.length}`;
  let dotsHTML='';
  for(let s=1;s<=setCount;s++){const cls=s<=done?'done':(s===done+1?'active':'');dotsHTML+=`<div class="set-chip ${cls}" onclick="tapSet(${s})"><span class="set-chip-num">${s}</span><span class="set-chip-lbl">${s<=done?'✓':'set'}</span></div>`}

  renderFocusBar();

function buildRestCard(ex){
  const circ=2*Math.PI*34,offset=circ*(1-S.restLeft/S.restTotal);
  return `<div class="rest-block" id="rest-card"><div class="rest-block-bg"></div><div class="rest-lbl">REST</div><div class="ring-wrap"><svg class="ring-svg" width="88" height="88" viewBox="0 0 88 88"><circle class="ring-bg" cx="44" cy="44" r="34"/><circle class="ring-arc" cx="44" cy="44" r="34" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" id="ring-arc"/></svg><div class="ring-num" id="ring-num">${S.restLeft}</div></div><div class="rest-next-ex">Next: ${ex.name}</div><button class="rest-skip" onclick="skipRest()">Skip Rest</button></div>`;
}
function renderFocusBar(){
  const p=PLAN[S.dayId],ex=p.exs[S.exIdx],setCount=parseInt(ex.sets),done=S.setsDone[S.exIdx];
  const allDone=done>=setCount,isLast=S.exIdx===p.exs.length-1;

  if(S.restActive)bar.innerHTML=`<button class="btn-secondary" onclick="skipRest()">Skip</button><button class="btn-primary" style="flex:2;pointer-events:none">Resting… ${S.restLeft}s</button>`;
  else if(!allDone)bar.innerHTML=`<button class="btn-primary" onclick="markNext()">Set ${done+1} Done ✓</button>`;
  else if(isLast)bar.innerHTML=`<button class="btn-secondary" onclick="promptExit()">Exit</button><button class="btn-primary" style="flex:2" onclick="completeWorkout()">Finish 🔥</button>`;
  else bar.innerHTML=`<button class="btn-secondary" onclick="skipEx()">Skip</button><button class="btn-primary" style="flex:2" onclick="nextEx()">Next Exercise →</button>`;
}
function tapSet(s){hap(7);const ex=PLAN[S.dayId].exs[S.exIdx],setCount=parseInt(ex.sets),prev=S.setsDone[S.exIdx];S.setsDone[S.exIdx]=s;if(s>prev&&s<setCount)startRest(ex.rest);else renderFocus()}
function markNext(){hap(12);const ex=PLAN[S.dayId].exs[S.exIdx],setCount=parseInt(ex.sets),cur=S.setsDone[S.exIdx];if(cur<setCount){S.setsDone[S.exIdx]=cur+1;if(cur+1<setCount)startRest(ex.rest);else renderFocus()}}
function startRest(seconds){
  clearRest();S.restActive=true;S.restTotal=seconds;S.restLeft=seconds;renderFocus();
  S.restTid=setInterval(()=>{
    S.restLeft--;
    const arc=document.getElementById('ring-arc'),num=document.getElementById('ring-num'),circ=2*Math.PI*34;
    if(arc)arc.setAttribute('stroke-dashoffset',(circ*(1-S.restLeft/S.restTotal)).toFixed(1));
    if(num)num.textContent=S.restLeft;
    const bar=document.getElementById('focus-bar-btns');
    if(bar){const pb=bar.querySelector('.btn-primary');if(pb)pb.textContent=`Resting… ${S.restLeft}s`}
    if(S.restLeft<=0){clearRest();hap([80,40,80]);renderFocus()}
  },1000);
}
function clearRest(){if(S.restTid){clearInterval(S.restTid);S.restTid=null}S.restActive=false;S.restLeft=0}
function skipRest(){hap(8);clearRest();renderFocus()}
function nextEx(){hap(14);clearRest();const card=document.getElementById('focus-main-card');if(card){card.classList.add('exit');setTimeout(()=>{S.exIdx++;renderFocus()},280)}else{S.exIdx++;renderFocus()}}
function skipEx(){hap(8);clearRest();S.exIdx++;renderFocus()}
function completeWorkout(){
  hap([100,50,200]);clearRest();S.completedDays.add(S.dayId);saveDone();
  const p=PLAN[S.dayId],elapsed=Math.max(1,Math.round((Date.now()-S.workoutStart)/60000)),sets=S.setsDone.reduce((a,b)=>a+b,0);
  document.getElementById('done-sub').textContent=`${p.name} done. ${elapsed} min of solid work.`;
  document.getElementById('done-stats').innerHTML=`<div class="cs-box"><span class="cs-val" style="color:var(--blue)">${elapsed}m</span><span class="cs-lbl">Duration</span></div><div class="cs-box"><span class="cs-val" style="color:var(--purple)">${sets}</span><span class="cs-lbl">Sets Done</span></div><div class="cs-box"><span class="cs-val" style="color:var(--orange)">${p.exs.length}</span><span class="cs-lbl">Exercises</span></div>`;
  document.getElementById('done-overlay').classList.add('visible');
}
function finishAndReturn(){document.getElementById('done-overlay').classList.remove('visible');renderDashboard();showView('dashboard');hap(20)}
loadDone();renderDashboard();
</script>
